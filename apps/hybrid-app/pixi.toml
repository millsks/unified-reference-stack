[workspace]
name        = "hybrid-app"
version     = "0.1.0"
description = "Python backend + Node.js frontend — unified-reference-stack"
channels    = ["conda-forge"]
platforms   = ["linux-64", "osx-arm64", "osx-64"]

[dependencies]
python = ">=3.12,<3.14"
nodejs = ">=20,<23"
# npm is bundled inside nodejs on conda-forge — do not add it separately

[pypi-dependencies]
fastapi = ">=0.111"
uvicorn = { version = ">=0.29", extras = ["standard"] }

[tasks]
backend-dev      = { cmd = "uvicorn backend.main:app --reload --port 8000" }
backend-test     = { cmd = "pytest tests/ -v", cwd = "backend" }

frontend-install = { cmd = "npm ci",        cwd = "frontend" }
frontend-dev     = { cmd = "npm run dev",   cwd = "frontend", depends-on = ["frontend-install"] }
frontend-build   = { cmd = "npm run build", cwd = "frontend", depends-on = ["frontend-install"] }

up    = "docker compose up -d"
down  = "docker compose down"
logs  = "docker compose logs -f"
build = "docker compose build"

[environments]
default = { features = [], solve-group = "default" }
