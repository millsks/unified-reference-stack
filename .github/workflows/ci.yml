name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          cache: true
      - name: Lint shell scripts
        run: pixi run lint-shell
      - name: Lint all apps
        run: pixi run lint-all

  test-python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/py-service
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          cache: true
          manifest-path: apps/py-service/pixi.toml
      - run: pixi run -e test test

  test-node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/node-api
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          cache: true
          manifest-path: apps/node-api/pixi.toml
      - run: pixi run test

  test-rust:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/rust-cli
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest
          cache: true
          manifest-path: apps/rust-cli/pixi.toml
      - run: pixi run test

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint, test-python, test-node, test-rust]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build all images
        run: docker buildx bake -f infra/docker-bake.hcl --load
